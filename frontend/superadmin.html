<!DOCTYPE html>
<html>
<head>
    <title>Super Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex bg-gray-100">

<!-- 🔥 SIDEBAR -->
<div class="w-64 bg-gray-900 text-white min-h-screen p-5">
    <h2 class="text-2xl font-bold mb-6">👑 Super Admin</h2>

    <button onclick="showSection('users')" class="block mb-3 w-full text-left">👤 Manage Users</button>
    <button onclick="showSection('products')" class="block mb-3 w-full text-left">📦 Products</button>
    <button onclick="showSection('logs')" class="block mb-3 w-full text-left">🕵️ Logs</button>
    <button onclick="logout()" class="block mt-10 text-red-400">🚪 Logout</button>
</div>

<!-- 🔥 MAIN CONTENT -->
<div class="flex-1 p-6">

    <!-- 👤 USERS -->
    <div id="users">
        <h2 class="text-xl font-bold mb-4">Create User</h2>

        <input id="name" placeholder="Name" class="border p-2 mb-2 w-full"><br>
        <input id="email" placeholder="Email" class="border p-2 mb-2 w-full"><br>
        <input id="password" placeholder="Password" class="border p-2 mb-2 w-full"><br>

        <select id="role" class="border p-2 mb-2 w-full">
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
        </select>

        <button onclick="createUser()" class="bg-blue-500 text-white px-4 py-2">Create User</button>
    </div>

    <!-- 📦 PRODUCTS -->
    <div id="products" class="hidden">
        <h2 class="text-xl font-bold mb-4">Products</h2>

        <table class="w-full bg-white">
            <thead>
                <tr class="bg-gray-200">
                    <th>Name</th>
                    <th>Qty</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productList"></tbody>
        </table>
    </div>

    <!-- 🕵️ LOGS -->
    <div id="logs" class="hidden">
        <h2 class="text-xl font-bold mb-4">System Logs</h2>

        <table class="w-full bg-white">
            <thead>
                <tr class="bg-gray-200">
                    <th>User</th>
                    <th>Action</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="logList"></tbody>
        </table>
    </div>

</div>

<script>
const token = localStorage.getItem("token");

// 🔐 CHECK LOGIN
if (!token) {
    alert("Login required");
    window.location.href = "index.html";
}

// 🔄 SWITCH SECTIONS
function showSection(section) {
    document.getElementById("users").classList.add("hidden");
    document.getElementById("products").classList.add("hidden");
    document.getElementById("logs").classList.add("hidden");

    document.getElementById(section).classList.remove("hidden");

    if (section === "products") loadProducts();
    if (section === "logs") loadLogs();
}

// 👤 CREATE USER
async function createUser() {
    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const roleInput = document.getElementById("role");

    if (!nameInput.value || !emailInput.value || !passwordInput.value) {
        alert("Name, email, and password are required.");
        return;
    }

    const res = await fetch("http://localhost:5000/api/auth/create-user", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            name: nameInput.value,
            email: emailInput.value,
            password: passwordInput.value,
            role: roleInput.value
        })
    });

    const data = await res.json();
    alert(data.message || data.error);
}
// 📦 LOAD PRODUCTS
async function loadProducts() {
    const res = await fetch("http://localhost:5000/api/products", {
        headers: { "Authorization": "Bearer " + token }
    });

    const products = await res.json();
    const list = document.getElementById("productList");
    list.innerHTML = "";

    products.forEach(p => {
        list.innerHTML += `
        <tr>
            <td>${p.name}</td>
            <td>${p.quantity}</td>
            <td>
                <button onclick="deleteProduct('${p._id}')">Delete</button>
            </td>
        </tr>`;
    });
}

// 🗑 DELETE PRODUCT
async function deleteProduct(id) {
    await fetch(`http://localhost:5000/api/products/delete/${id}`, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
    });

    loadProducts();
}

// 🕵️ LOAD LOGS
async function loadLogs() {
    const res = await fetch("http://localhost:5000/api/logs", {
        headers: { "Authorization": "Bearer " + token }
    });

    const logs = await res.json();
    const list = document.getElementById("logList");

    list.innerHTML = "";

    logs.forEach(log => {
        list.innerHTML += `
        <tr>
            <td>${log.user}</td>
            <td>${log.action}</td>
            <td>${new Date(log.time).toLocaleString()}</td>
        </tr>`;
    });
}

// 🚪 LOGOUT
function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}
</script>

</body>
</html>
