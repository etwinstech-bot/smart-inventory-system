<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory System</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #1f4037, #99f2c8);
}

.card {
    border-radius: 15px;
}

h2 {
    font-weight: bold;
}

</style>
</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- LOGIN CARD -->
            <div class="card shadow p-4 mb-4">
                <h3 class="text-center">🔐 Login</h3>

                <input id="email" class="form-control my-2" placeholder="Email">
                <input id="password" type="password" class="form-control my-2" placeholder="Password">

                <button class="btn btn-primary w-100" onclick="login()">Login</button>
            </div>

        </div>
    </div>

    <!-- PRODUCTS SECTION -->
    <div class="card shadow p-4">

        <h3 class="text-center mb-3">📦 Add Product</h3>

        <div class="row">
            <div class="col-md-3">
                <input id="name" class="form-control" placeholder="Product Name">
            </div>
            <div class="col-md-3">
                <input id="category" class="form-control" placeholder="Category">
            </div>
            <div class="col-md-2">
                <input id="price" class="form-control" placeholder="Price">
            </div>
            <div class="col-md-2">
                <input id="quantity" class="form-control" placeholder="Quantity">
            </div>
            <div class="col-md-2">
                <button class="btn btn-success w-100" onclick="addProduct()">Add</button>
            </div>
        </div>

        <hr>

        <h4 class="text-center">📋 Products</h4>

        <table class="table table-bordered table-striped mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Qty</th>
                </tr>
            </thead>
            <tbody id="productList"></tbody>
        </table>

    </div>

</div>

<script>

// LOGIN
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://localhost:5000/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.token) {
        localStorage.setItem("token", data.token);
        localStorage.setItem("role", data.role);

        alert("Login successful");

        if (data.role === "superadmin") {
            window.location.href = "superadmin.html";
        } else {
            window.location.href = "dashboard.html";
        }

    } else {
        alert(data.message || "Login failed");
    }
}

// ADD PRODUCT
async function addProduct() {

    const product = {
        name: document.getElementById("name").value,
        category: document.getElementById("category").value,
        price: Number(document.getElementById("price").value),
        quantity: Number(document.getElementById("quantity").value)
    };

    await fetch("http://localhost:5000/api/products/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(product)
    });

    alert("Product Added");

    getProducts();
}

// GET PRODUCTS
async function getProducts() {

    const res = await fetch("http://localhost:5000/api/products");
    const data = await res.json();

    const list = document.getElementById("productList");
    list.innerHTML = "";

    data.forEach(p => {
        list.innerHTML += `
            <tr>
                <td>${p.name}</td>
                <td>${p.category}</td>
                <td>${p.price}</td>
                <td>${p.quantity}</td>
            </tr>
        `;
    });
}

// LOAD PRODUCTS
getProducts();

</script>

</body>
</html>
