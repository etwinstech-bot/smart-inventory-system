<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #141e30, #243b55);
}

.login-card {
    margin-top: 10%;
    border-radius: 15px;
}
</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card login-card shadow p-4">

<h3 class="text-center mb-3">🔐 Login</h3>

<input id="email" class="form-control my-2" placeholder="Email">

<input id="password" type="password" class="form-control my-2" placeholder="Password">

<button id="loginBtn" class="btn btn-primary w-100" onclick="login()">Login</button>

<p id="msg" class="text-danger mt-2 text-center"></p>

</div>

</div>

</div>

</div>

<script>

async function login() {

    const btn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");

    btn.disabled = true;
    btn.innerText = "Logging in...";

    try {

        const res = await fetch("http://localhost:5000/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: document.getElementById("email").value,
                password: document.getElementById("password").value
            })
        });

        const data = await res.json();

        if (data.token) {

            localStorage.setItem("token", data.token);
            localStorage.setItem("role", data.role);

            alert("Login successful");

            // 👑 ROLE-BASED REDIRECT (IMPORTANT)
            if (data.role === "superadmin") {
                window.location.href = "superadmin.html";
            } else {
                window.location.href = "dashboard.html";
            }

        } else {
            msg.innerText = data.message || "Login failed";
        }

    } catch (err) {
        console.error(err);
        msg.innerText = "Server error. Please try again.";
    }

    btn.disabled = false;
    btn.innerText = "Login";
}

</script>

</body>
</html>
