<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #f4f6f9;
}

.card {
    border-radius: 12px;
}

.low-stock {
    color: red;
    font-weight: bold;
}

.ok-stock {
    color: green;
    font-weight: bold;
}

</style>
</head>

<body>

<div class="container mt-4">

<h1 class="text-center mb-4">📦 Inventory Dashboard</h1>
<div id="lowStockAlert"></div>

<!-- 🔐 AUTH CHECK -->
<script>
const token = localStorage.getItem("token");

if (!token) {
    alert("Please login first");
    window.location.href = "index.html";
}
</script>

<!-- ➕ ADD PRODUCT -->
<div class="card shadow p-3 mb-4">

<h4>➕ Add Product</h4>

<div class="row">
    <div class="col-md-3">
        <input id="name" class="form-control" placeholder="Product Name">
    </div>
    <div class="col-md-3">
        <input id="category" class="form-control" placeholder="Category">
    </div>
    <div class="col-md-2">
        <input id="price" type="number" class="form-control" placeholder="Price">
    </div>
    <div class="col-md-2">
        <input id="quantity" type="number" class="form-control" placeholder="Quantity">
    </div>
    <div class="col-md-2">
        <button class="btn btn-success w-100" onclick="addProduct()">Add</button>
    </div>
</div>

</div>

<!-- 📋 PRODUCT TABLE -->
<div class="card shadow p-3 mb-4">

<h4>📋 Product List</h4>

<div class="table-responsive">
<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="productTable"></tbody>

</table>
</div>

</div>

<!-- 📊 CHART -->
<div class="card shadow p-3">

<h4>📊 Stock Chart</h4>
<canvas id="chart"></canvas>

</div>

</div>

<script>

// 📦 LOAD PRODUCTS
let myChart;

async function loadProducts() {

    const res = await fetch("http://localhost:5000/api/products", {
        headers: { "Authorization": "Bearer " + token }
    });

    const products = await res.json();

    const table = document.getElementById("productTable");
    table.innerHTML = "";
    let lowStockCount = 0;

    products.forEach(p => {
        const isLowStock = p.quantity < 10;
        if (isLowStock) lowStockCount++;

        let status = isLowStock
            ? `<span class="low-stock">LOW STOCK ⚠️</span>`
            : `<span class="ok-stock">OK</span>`;

        table.innerHTML += `
        <tr>
            <td>${p.name}</td>
            <td>${p.category || "-"}</td>
            <td>${p.price || 0}</td>
            <td>${p.quantity}</td>
            <td>${status}</td>
            <td>
                <button class="btn btn-sm btn-warning" onclick="editProduct('${p._id}', '${p.name}')">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteProduct('${p._id}')">Delete</button>
            </td>
        </tr>
        `;
    });

    const alertEl = document.getElementById("lowStockAlert");
    if (lowStockCount > 0) {
        alertEl.innerHTML = `<div class="alert alert-warning">⚠️ ${lowStockCount} product(s) have fewer than 10 items. Please restock soon.</div>`;
    } else {
        alertEl.innerHTML = "";
    }

    loadChart(products);
}


// ➕ ADD PRODUCT
async function addProduct() {

    const name = document.getElementById("name").value;
    const category = document.getElementById("category").value;
    const price = document.getElementById("price").value;
    const quantity = document.getElementById("quantity").value;

    const res = await fetch("http://localhost:5000/api/products/add", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ name, category, price, quantity })
    });

    const data = await res.json();

    alert(data.message || "Product added");

    loadProducts();
}


// ✏️ EDIT PRODUCT
async function editProduct(id, name) {

    const quantity = prompt(`Enter new quantity for ${name}`);

    if (!quantity) return;

    const res = await fetch(`http://localhost:5000/api/products/update/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ quantity })
    });

    const data = await res.json();

    alert(data.message || "Updated");

    loadProducts();
}


// 🗑 DELETE PRODUCT
async function deleteProduct(id) {

    if (!confirm("Are you sure you want to delete this product?")) return;

    const res = await fetch(`http://localhost:5000/api/products/delete/${id}`, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();

    alert(data.message || "Deleted");

    loadProducts();
}


// 📊 CHART
function loadChart(products) {

    const names = products.map(p => p.name);
    const qty = products.map(p => p.quantity);

    if (myChart) myChart.destroy(); // prevent duplication

    const ctx = document.getElementById("chart").getContext("2d");

    myChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: names,
            datasets: [{
                label: "Stock Levels",
                data: qty
            }]
        }
    });
}


// 🔐 AUTO LOGOUT (1 min)
let timer;

function resetTimer() {
    clearTimeout(timer);

    timer = setTimeout(() => {
        alert("Logged out due to inactivity");
        localStorage.clear();
        window.location.href = "index.html";
    }, 60000);
}

document.addEventListener("DOMContentLoaded", () => {
    loadProducts();
    resetTimer();
});

document.onmousemove = resetTimer;
document.onkeypress = resetTimer;

</script>

</body>
</html>
